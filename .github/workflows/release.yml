name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Add Optimizely NuGet source
        run: |
          dotnet nuget add source https://api.nuget.optimizely.com/v3/index.json \
            --name optimizely \
            --username ci \
            --password ${{ secrets.OPTIMIZELY_NUGET_TOKEN }} \
            --store-password-in-clear-text
        env:
          OPTIMIZELY_NUGET_TOKEN: ${{ secrets.OPTIMIZELY_NUGET_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./artifacts

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
